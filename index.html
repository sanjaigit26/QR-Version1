<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Petverz - Rocky</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

  <!-- CARD -->
  <div class="card">

    <img src="https://images.unsplash.com/photo-1558788353-f76d92427f16" class="pet-img">

    <h1>Rocky</h1>
    <p class="pet-id">ID: PVZ-102938</p>
    <p class="dob">DOB: 01/23/2020</p>

    <div class="status">Safe</div>

    <a href="tel:9042483785" class="call-btn">Call Owner</a>

    <p class="tagline">A loved life,simplified</p>

  </div>

  <!-- QUICK ACTIONS -->
  <div class="actions">
    <button>Book Vet</button>
    <button>Grooming</button>
    <button>Pet Store</button>
  </div>

  <!-- OWNER -->
  <div class="section">
    <h3>Owner</h3>
    <p>Sanjai M</p>
  </div>

  <!-- MEDICAL -->
  <div class="section">
    <h3>Medical</h3>
    <p>Vaccinated</p>
    <p>No allergies</p>
  </div>

  <!-- WALLET -->
  <div class="section wallet">
    <h3>Wallet</h3>
    <p>Balance: ₹500</p>
    <p>Coins: 120</p>
  </div>

  <!-- SERVICES -->
  <div class="section">
    <h3>Services</h3>
    <p>Grooming, Veterinary, Store</p>
  </div>

  <p class="footer">Powered by Petverz</p>

</div>

</body>
</html>
